name: build-and-release

# Multi-track: tag prefix selects which manuscript directory to build.
#   viewpoint-v*        -> manuscript            (Lancet Digital Health)
#   viewpoint-nejmai-v* -> manuscript-nejmai     (NEJM AI Perspective)
#   viewpoint-npjdm-v*  -> manuscript-npjdm      (npj Digital Medicine Perspective)
#   case-study-v*       -> case-study/manuscript (case-study companion)
#
# workflow_dispatch accepts an explicit manuscript_dir for ad-hoc builds.

on:
  push:
    tags:
      - "viewpoint-v*"
      - "viewpoint-nejmai-v*"
      - "viewpoint-npjdm-v*"
      - "case-study-v*"
  workflow_dispatch:
    inputs:
      manuscript_dir:
        description: "Manuscript directory to build (when triggered manually)"
        required: true
        type: choice
        default: manuscript-npjdm
        options:
          - manuscript
          - manuscript-nejmai
          - manuscript-npjdm
          - case-study/manuscript

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve manuscript directory and slug
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.manuscript_dir }}" ]; then
            DIR="${{ github.event.inputs.manuscript_dir }}"
          else
            TAG="${GITHUB_REF_NAME}"
            case "$TAG" in
              viewpoint-nejmai-v*) DIR=manuscript-nejmai ;;
              viewpoint-npjdm-v*)  DIR=manuscript-npjdm ;;
              viewpoint-v*)        DIR=manuscript ;;
              case-study-v*)       DIR=case-study/manuscript ;;
              *) echo "::error::Unknown tag prefix: $TAG"; exit 1 ;;
            esac
          fi
          if [ ! -d "$DIR" ]; then
            echo "::error::Manuscript directory '$DIR' does not exist"
            exit 1
          fi
          case "$DIR" in
            manuscript)             SLUG=lancetdh ;;
            manuscript-nejmai)      SLUG=nejmai ;;
            manuscript-npjdm)       SLUG=npjdm ;;
            case-study/manuscript)  SLUG=case-study ;;
          esac
          echo "dir=$DIR"   >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "Resolved: dir=$DIR slug=$SLUG"

      - name: Build LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: ${{ steps.resolve.outputs.dir }}
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Verify PDF produced
        run: |
          DIR="${{ steps.resolve.outputs.dir }}"
          test -s "$DIR/main.pdf" || { echo "::error::$DIR/main.pdf missing or empty"; exit 1; }

      - name: Lint placeholder DOIs
        run: |
          DIR="${{ steps.resolve.outputs.dir }}"
          if [ -f "$DIR/references.bib" ] && grep -q "10.0000/placeholder" "$DIR/references.bib"; then
            echo "::error::$DIR/references.bib still contains 10.0000/placeholder entries"
            exit 1
          fi

      - name: Stage release artefacts
        run: |
          DIR="${{ steps.resolve.outputs.dir }}"
          SLUG="${{ steps.resolve.outputs.slug }}"
          REPO="${GITHUB_REPOSITORY#*/}"
          mkdir -p release
          cp "$DIR/main.pdf" "release/${REPO}-${SLUG}.pdf"
          cp "$DIR/main.tex" "release/${REPO}-${SLUG}.tex"
          if [ -f "$DIR/references.bib" ]; then
            cp "$DIR/references.bib" "release/${REPO}-${SLUG}.bib"
          fi
          tar_inputs=("$DIR/main.tex")
          [ -f "$DIR/references.bib" ]   && tar_inputs+=("$DIR/references.bib")
          [ -f "$DIR/Makefile" ]         && tar_inputs+=("$DIR/Makefile")
          [ -f "$DIR/latexmkrc" ]        && tar_inputs+=("$DIR/latexmkrc")
          [ -f "$DIR/cover-letter.md" ]  && tar_inputs+=("$DIR/cover-letter.md")
          [ -d "$DIR/figures" ]          && tar_inputs+=("$DIR/figures")
          [ -d case-study/analysis ]     && tar_inputs+=(case-study/analysis)
          [ -f docs/prereg.md ]          && tar_inputs+=(docs/prereg.md)
          [ -f docs/ai-usage-disclosure.md ]  && tar_inputs+=(docs/ai-usage-disclosure.md)
          [ -f docs/disclosure2-schema.json ] && tar_inputs+=(docs/disclosure2-schema.json)
          [ -f docs/design.md ]          && tar_inputs+=(docs/design.md)
          [ -f docs/argument-audit.argdown ] && tar_inputs+=(docs/argument-audit.argdown)
          [ -f docs/argument-audit.svg ] && tar_inputs+=(docs/argument-audit.svg)
          [ -f docs/ledger.md ]          && tar_inputs+=(docs/ledger.md)
          [ -f CITATION.cff ]            && tar_inputs+=(CITATION.cff)
          [ -f README.md ]               && tar_inputs+=(README.md)
          [ -f LICENSE ]                 && tar_inputs+=(LICENSE)
          tar_inputs+=(.github/workflows/release.yml)
          tar -czf "release/source-bundle-${SLUG}.tar.gz" "${tar_inputs[@]}"
          ls -la release/

      - name: Upload PDF as workflow artefact
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-pdf-${{ steps.resolve.outputs.slug }}
          path: release/*.pdf

      - name: Attach artefacts to the tagged release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.pdf
            release/*.tex
            release/*.bib
            release/source-bundle-*.tar.gz
          fail_on_unmatched_files: false
          # Do NOT auto-generate release notes: user-supplied notes via
          # `gh release create --notes` are the single source of truth.
